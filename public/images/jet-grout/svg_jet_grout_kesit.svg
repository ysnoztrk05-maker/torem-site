<svg viewBox="0 0 860 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Jet Grout Kolon Kesit Diyagramı">
  <defs>
    <linearGradient id="kBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F2ED"/>
      <stop offset="100%" stop-color="#E8E4DD"/>
    </linearGradient>
    <pattern id="soilcrete" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#A0A0A0"/>
      <circle cx="2" cy="2" r="1" fill="#8A8A8A"/>
      <circle cx="6" cy="6" r="1.2" fill="#B0B0B0"/>
    </pattern>
    <filter id="kShadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>

  <rect width="860" height="620" rx="16" fill="url(#kBg)"/>
  <text x="430" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#1B2B3A">Jet Grout Kolon Kesit Diyagramı</text>
  <line x1="310" y1="50" x2="550" y2="50" stroke="#C8873A" stroke-width="3" stroke-linecap="round"/>

  <!-- Zemin yüzeyi -->
  <rect x="100" y="75" width="500" height="15" rx="0" fill="#6B8E23"/>
  <text x="350" y="86" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#ffffff">ZEMİN YÜZEYİ</text>

  <!-- Zemin katmanları -->
  <!-- Bitkisel toprak -->
  <rect x="100" y="90" width="500" height="50" fill="#8B6914"/>
  <text x="115" y="120" font-family="system-ui,sans-serif" font-size="11" fill="#ffffff" font-weight="500">Bitkisel Toprak / Dolgu</text>

  <!-- Kumlu silt -->
  <rect x="100" y="140" width="500" height="90" fill="#C4A35A"/>
  <text x="115" y="190" font-family="system-ui,sans-serif" font-size="11" fill="#1B2B3A" font-weight="500">Kumlu Silt (gevşek)</text>

  <!-- Killi kum -->
  <rect x="100" y="230" width="500" height="100" fill="#9B8B6B"/>
  <text x="115" y="285" font-family="system-ui,sans-serif" font-size="11" fill="#ffffff" font-weight="500">Killi Kum</text>

  <!-- Çakıllı zemin -->
  <rect x="100" y="330" width="500" height="80" fill="#7A7A6A"/>
  <text x="115" y="375" font-family="system-ui,sans-serif" font-size="11" fill="#ffffff" font-weight="500">Çakıllı Zemin</text>

  <!-- Sağlam zemin / kaya -->
  <rect x="100" y="410" width="500" height="70" fill="#4A4A4A"/>
  <text x="115" y="450" font-family="system-ui,sans-serif" font-size="11" fill="#ffffff" font-weight="600">Sağlam Zemin / Ana Kaya</text>

  <!-- Jet Grout Kolonu -->
  <rect x="305" y="90" width="90" height="330" rx="4" fill="url(#soilcrete)" stroke="#2E5077" stroke-width="2"/>
  <rect x="310" y="95" width="80" height="320" rx="2" fill="rgba(46,80,119,0.3)"/>

  <!-- Kolon etiketi -->
  <line x1="395" y1="255" x2="450" y2="255" stroke="#2E5077" stroke-width="1.5"/>
  <circle cx="395" cy="255" r="3" fill="#2E5077"/>

  <!-- Bilgi kutusu sağda -->
  <g transform="translate(460,150)">
    <rect width="170" height="220" rx="10" fill="#ffffff" filter="url(#kShadow)"/>
    <rect width="170" height="35" rx="10" fill="#2E5077"/>
    <rect y="25" width="170" height="10" fill="#2E5077"/>
    <text x="85" y="23" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#ffffff">Kolon Özellikleri</text>

    <text x="15" y="60" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#5A6A7A">Kolon Çapı</text>
    <text x="155" y="60" text-anchor="end" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#2E5077">Ø60–250 cm</text>

    <line x1="15" y1="70" x2="155" y2="70" stroke="#E0DCD6" stroke-width="1"/>

    <text x="15" y="90" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#5A6A7A">Derinlik</text>
    <text x="155" y="90" text-anchor="end" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#2E5077">5–35+ m</text>

    <line x1="15" y1="100" x2="155" y2="100" stroke="#E0DCD6" stroke-width="1"/>

    <text x="15" y="120" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#5A6A7A">Basınç Dayanımı</text>
    <text x="155" y="120" text-anchor="end" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#2E5077">5–30 MPa</text>

    <line x1="15" y1="130" x2="155" y2="130" stroke="#E0DCD6" stroke-width="1"/>

    <text x="15" y="150" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#5A6A7A">Geçirimlilik</text>
    <text x="155" y="150" text-anchor="end" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#2E5077">k ≤ 10⁻⁷ m/s</text>

    <line x1="15" y1="160" x2="155" y2="160" stroke="#E0DCD6" stroke-width="1"/>

    <text x="15" y="180" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#5A6A7A">Malzeme</text>
    <text x="155" y="180" text-anchor="end" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#2E5077">Soilcrete</text>

    <text x="15" y="205" font-family="system-ui,sans-serif" font-size="10" fill="#C8873A" font-weight="600">TS EN 12716</text>
  </g>

  <!-- Derinlik cetveli solda -->
  <g transform="translate(60,90)">
    <line x1="30" y1="0" x2="30" y2="390" stroke="#1B2B3A" stroke-width="1.5"/>
    <line x1="25" y1="0" x2="35" y2="0" stroke="#1B2B3A" stroke-width="1.5"/>
    <text x="20" y="5" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" fill="#1B2B3A" font-weight="600">0 m</text>

    <line x1="25" y1="78" x2="35" y2="78" stroke="#1B2B3A" stroke-width="1.5"/>
    <text x="20" y="82" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" fill="#1B2B3A" font-weight="600">5 m</text>

    <line x1="25" y1="156" x2="35" y2="156" stroke="#1B2B3A" stroke-width="1.5"/>
    <text x="20" y="160" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" fill="#1B2B3A" font-weight="600">10 m</text>

    <line x1="25" y1="234" x2="35" y2="234" stroke="#1B2B3A" stroke-width="1.5"/>
    <text x="20" y="238" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" fill="#1B2B3A" font-weight="600">15 m</text>

    <line x1="25" y1="312" x2="35" y2="312" stroke="#1B2B3A" stroke-width="1.5"/>
    <text x="20" y="316" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" fill="#1B2B3A" font-weight="600">20 m</text>

    <line x1="25" y1="390" x2="35" y2="390" stroke="#1B2B3A" stroke-width="1.5"/>
    <text x="20" y="394" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" fill="#1B2B3A" font-weight="600">25 m</text>
  </g>

  <!-- Kolon çapı ok göstergesi -->
  <line x1="305" y1="500" x2="395" y2="500" stroke="#C8873A" stroke-width="2"/>
  <line x1="305" y1="495" x2="305" y2="505" stroke="#C8873A" stroke-width="2"/>
  <line x1="395" y1="495" x2="395" y2="505" stroke="#C8873A" stroke-width="2"/>
  <text x="350" y="520" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#C8873A">Ø 60–250 cm</text>

  <!-- Karışım zonu -->
  <rect x="290" y="90" width="15" height="330" rx="2" fill="rgba(46,80,119,0.12)"/>
  <rect x="395" y="90" width="15" height="330" rx="2" fill="rgba(46,80,119,0.12)"/>

  <!-- Alt kaynak -->
  <text x="430" y="570" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#5A6A7A">Soilcrete kolon — çimento şerbeti ile zemin partiküllerinin yerinde karışımı</text>
  <text x="430" y="590" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#9A9A9A">Torem Zemin Mühendislik — toremzemin.com</text>
</svg>