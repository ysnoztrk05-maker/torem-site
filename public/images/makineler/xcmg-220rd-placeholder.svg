<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="XCMG 220RD fore kazık makinesi - filo fotoğrafı yakında eklenecek">
  <!-- Arka plan: navy gradient (siteyle uyumlu) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001530"/>
      <stop offset="60%" stop-color="#002147"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="machine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#a0821c"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#grid)"/>

  <!-- Yer/zemin çizgisi -->
  <line x1="0" y1="720" x2="1200" y2="720" stroke="rgba(212,175,55,0.25)" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- Fore kazık makinesi silüeti -->
  <g transform="translate(420 180)">
    <!-- Boom/Mast (uzun dikey) -->
    <rect x="160" y="0" width="36" height="540" fill="url(#machine)" rx="4"/>
    <!-- Mast detayları (kafes) -->
    <g stroke="rgba(0,21,48,0.5)" stroke-width="2" fill="none">
      <line x1="160" y1="60"  x2="196" y2="60"/>
      <line x1="160" y1="140" x2="196" y2="140"/>
      <line x1="160" y1="220" x2="196" y2="220"/>
      <line x1="160" y1="300" x2="196" y2="300"/>
      <line x1="160" y1="380" x2="196" y2="380"/>
      <line x1="160" y1="460" x2="196" y2="460"/>
    </g>
    <!-- Üst makara -->
    <circle cx="178" cy="20" r="14" fill="#d4af37" stroke="#001530" stroke-width="3"/>
    <!-- Halat -->
    <line x1="178" y1="34" x2="178" y2="320" stroke="#5A6A7A" stroke-width="2"/>
    <!-- Kelly çubuğu / Auger -->
    <rect x="170" y="320" width="16" height="200" fill="#5A6A7A"/>
    <!-- Auger ucu -->
    <polygon points="160,520 196,520 178,560" fill="#5A6A7A"/>

    <!-- Üst yapı (kabin + motor) -->
    <rect x="40" y="420" width="240" height="120" fill="url(#machine)" rx="6"/>
    <rect x="60" y="440" width="80" height="60" fill="#001530" rx="4"/> <!-- Kabin penceresi -->
    <text x="220" y="500" text-anchor="middle" font-family="Consolas, monospace" font-size="22" font-weight="700" fill="#001530">XCMG</text>

    <!-- Paletli alt yapı (crawler) -->
    <rect x="20" y="540" width="280" height="50" fill="#333" rx="6"/>
    <circle cx="50" cy="565" r="18" fill="#5A6A7A" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="110" cy="565" r="18" fill="#5A6A7A" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="170" cy="565" r="18" fill="#5A6A7A" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="230" cy="565" r="18" fill="#5A6A7A" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="270" cy="565" r="18" fill="#5A6A7A" stroke="#1a1a1a" stroke-width="2"/>
  </g>

  <!-- Üst sol köşe: marka rozeti -->
  <g transform="translate(48 48)">
    <rect x="0" y="0" width="200" height="44" rx="6" fill="rgba(212,175,55,0.12)" stroke="#d4af37" stroke-width="1"/>
    <text x="100" y="29" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#d4af37" letter-spacing="2">FORE KAZIK · XCMG</text>
  </g>

  <!-- Alt: Model bilgisi -->
  <g transform="translate(600 800)">
    <text text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="42" font-weight="600" fill="#ffffff">XCMG 220RD</text>
    <text y="36" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.55)" letter-spacing="3">FİLO FOTOĞRAFI YAKINDA EKLENECEK</text>
  </g>
</svg>
